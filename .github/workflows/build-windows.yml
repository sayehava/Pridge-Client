name: Build Windows packages

on:
  workflow_call:
    inputs:
      version:
        description: Version or v-prefixed tag embedded in the packages
        required: false
        type: string
        default: ""
    secrets:
      WINDOWS_CERTIFICATE_BASE64:
        required: false
      WINDOWS_CERTIFICATE_PASSWORD:
        required: false
      WINDOWS_TIMESTAMP_URL:
        required: false

  workflow_dispatch:
    inputs:
      version:
        description: Optional version override, such as 1.0.0
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Windows x64 ${{ matrix.variant }}
    runs-on: windows-2025

    strategy:
      fail-fast: false
      matrix:
        variant:
          - Native
          - PyInstaller

    env:
      PRIDGE_VERSION: ${{ inputs.version }}
      PRIDGE_WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      PRIDGE_WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      PRIDGE_WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: x64
          cache: pip

      - name: Install build dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          python -m pip install --upgrade pip
          python -m pip install -r requirements-release.txt -e ".[windows,secure,tray]"

          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"

          if (-not (Test-Path $iscc -PathType Leaf)) {
            choco install innosetup --no-progress --yes
          }

          if (-not (Test-Path $iscc -PathType Leaf)) {
            throw "Inno Setup was not installed successfully."
          }

      - name: Run tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python -B -m unittest discover -s tests

      - name: Build ${{ matrix.variant }} packages
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $release = Join-Path $env:GITHUB_WORKSPACE "build"

          New-Item `
            -ItemType Directory `
            -Path $release `
            -Force |
            Out-Null

          ./scripts/build-windows.ps1 `
            -Variant "${{ matrix.variant }}" `
            -OutputDir $release

          Write-Host "Build directory contents:"

          Get-ChildItem $release -Recurse |
            Select-Object FullName, Length |
            Format-Table -AutoSize

      - name: Upload packages
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pridge-windows-${{ matrix.variant }}
          path: |
            ${{ github.workspace }}/build/Pridge-Client-${{ matrix.variant }}-Setup-x64.exe
            ${{ github.workspace }}/build/Pridge-Client-${{ matrix.variant }}-Windows-x64-Portable.zip
          if-no-files-found: warn
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-windows-${{ matrix.variant }}
          path: |
            ${{ github.workspace }}/build/*.log
            ${{ github.workspace }}/build/*.xml
          if-no-files-found: warn
          retention-days: 30

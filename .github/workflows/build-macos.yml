name: Build macOS packages

on:
  workflow_call:
    inputs:
      version:
        description: Version or v-prefixed tag embedded in the packages
        required: false
        type: string
        default: ""
    secrets:
      MACOS_CERTIFICATE_BASE64:
        required: false
      MACOS_CERTIFICATE_PASSWORD:
        required: false
      MACOS_SIGNING_IDENTITY:
        required: false
      NOTARY_KEY_BASE64:
        required: false
      NOTARY_KEY_ID:
        required: false
      NOTARY_ISSUER_ID:
        required: false
      NOTARY_APPLE_ID:
        required: false
      NOTARY_TEAM_ID:
        required: false
      NOTARY_PASSWORD:
        required: false

  workflow_dispatch:
    inputs:
      version:
        description: Optional version override, such as 1.0.0
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: macOS ${{ matrix.arch }} ${{ matrix.variant }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
            variant: Native

          - runner: macos-15
            arch: arm64
            variant: PyInstaller

          - runner: macos-15-intel
            arch: x86_64
            variant: Native

          - runner: macos-15-intel
            arch: x86_64
            variant: PyInstaller

    runs-on: ${{ matrix.runner }}

    env:
      PRINTBRIDGE_VERSION: ${{ inputs.version }}
      PRINTBRIDGE_MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
      PRINTBRIDGE_NOTARY_KEY_BASE64: ${{ secrets.NOTARY_KEY_BASE64 }}
      PRINTBRIDGE_NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
      PRINTBRIDGE_NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
      PRINTBRIDGE_NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
      PRINTBRIDGE_NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
      PRINTBRIDGE_NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
      MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        run: |
          set -euo pipefail

          python3 -m pip install --upgrade pip
          python3 -m pip install \
            -r requirements-release.txt \
            -e ".[secure,tray]"

      - name: Import optional signing certificate
        if: ${{ env.MACOS_CERTIFICATE_BASE64 != '' }}
        env:
          CERTIFICATE_BASE64: ${{ env.MACOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          export KEYCHAIN_PATH="$RUNNER_TEMP/printbridge-signing.keychain-db"
          export KEYCHAIN_PASSWORD="printbridge-ci-keychain"

          python3 -c '
          import base64
          import os
          import pathlib

          certificate = pathlib.Path(
              os.environ["RUNNER_TEMP"],
              "certificate.p12",
          )

          certificate.write_bytes(
              base64.b64decode(os.environ["CERTIFICATE_BASE64"])
          )
          '

          security create-keychain \
            -p "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security set-keychain-settings \
            -lut 21600 \
            "$KEYCHAIN_PATH"

          security unlock-keychain \
            -p "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security import \
            "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychains \
            -d user \
            -s "$KEYCHAIN_PATH"

          echo "Imported signing identities:"
          security find-identity \
            -v \
            -p codesigning \
            "$KEYCHAIN_PATH"

      - name: Run tests
        run: |
          set -euo pipefail
          python3 -B -m unittest discover -s tests

      - name: Build ${{ matrix.variant }} package
        run: |
          set -euo pipefail

          release="$GITHUB_WORKSPACE/build"

          bash scripts/build-macos.sh \
            "${{ matrix.variant }}" \
            --output-dir "$release"

      - name: Validate mounted app bundle
        run: |
          set -euo pipefail

          variant="${{ matrix.variant }}"
          arch="${{ matrix.arch }}"
          release="$GITHUB_WORKSPACE/build"

          package="PrintBridge-Client-${variant}-macOS-${arch}.dmg"
          dmg="$release/$package"

          if [[ ! -f "$dmg" ]]; then
            echo "Expected DMG was not created: $dmg"
            echo "Build directory contents:"
            find "$release" -maxdepth 3 -print || true
            exit 1
          fi

          if [[ ! -s "$dmg" ]]; then
            echo "DMG is empty: $dmg"
            exit 1
          fi

          mountpoint="$RUNNER_TEMP/mounted-${variant}-${arch}"
          clean_home="$RUNNER_TEMP/clean-home-${variant}-${arch}"
          gui_log="$RUNNER_TEMP/gui-start-${variant}-${arch}.log"

          rm -rf "$mountpoint" "$clean_home"

          mkdir -p \
            "$mountpoint" \
            "$clean_home"

          cleanup() {
            hdiutil detach "$mountpoint" -force >/dev/null 2>&1 || true
          }

          trap cleanup EXIT

          hdiutil attach \
            -nobrowse \
            -readonly \
            -mountpoint "$mountpoint" \
            "$dmg"

          app="$mountpoint/PrintBridge Client.app"

          test -d "$app"
          test -f "$app/Contents/Info.plist"
          test -f "$app/Contents/Resources/Legal/LICENSE"
          test -f "$app/Contents/Resources/Legal/ADDITIONAL_TERMS.md"

          if [[ "$variant" == "Native" ]]; then
            runtime_root="$app/Contents/MacOS"
          else
            runtime_root="$app/Contents/Resources"
          fi

          test -f "$runtime_root/printbridge_client/webui/index.html"

          build_variant="$(
            /usr/libexec/PlistBuddy \
              -c "Print :PrintBridgeBuildVariant" \
              "$app/Contents/Info.plist"
          )"

          if [[ "$build_variant" != "$variant" ]]; then
            echo "Unexpected build variant: $build_variant"
            exit 1
          fi

          executable="$(
            /usr/libexec/PlistBuddy \
              -c "Print :CFBundleExecutable" \
              "$app/Contents/Info.plist"
          )"

          executable_path="$app/Contents/MacOS/$executable"

          test -x "$executable_path"

          echo "Executable architectures:"
          lipo -archs "$executable_path"

          lipo -archs "$executable_path" |
            tr ' ' '\n' |
            grep -Fxq "$arch"

          if [[ -n "${PRINTBRIDGE_MACOS_SIGNING_IDENTITY:-}" ]]; then
            codesign \
              --verify \
              --deep \
              --strict \
              --verbose=2 \
              "$app"
          else
            echo "No Developer ID signing identity configured."

            codesign \
              --verify \
              --deep \
              --strict \
              --verbose=2 \
              "$app" || \
              echo "Strict signature verification skipped for unsigned development build."
          fi

          HOME="$clean_home" \
            "$executable_path" \
            > "$gui_log" \
            2>&1 &

          app_pid=$!

          sleep 10

          if ! kill -0 "$app_pid" 2>/dev/null; then
            echo "The macOS GUI exited during startup."

            if [[ -f "$gui_log" ]]; then
              echo "===== GUI startup log ====="
              cat "$gui_log"
              echo "==========================="
            fi

            exit 1
          fi

          kill "$app_pid" || true
          wait "$app_pid" || true

          if grep -Eq \
            "Traceback|CRITICAL|FATAL" \
            "$gui_log"; then

            echo "Fatal startup output detected:"
            cat "$gui_log"
            exit 1
          fi

          hdiutil detach "$mountpoint"
          trap - EXIT

          echo "macOS package validation completed successfully."

      - name: Upload package
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: printbridge-macos-${{ matrix.variant }}-${{ matrix.arch }}
          path: ${{ github.workspace }}/build/PrintBridge-Client-${{ matrix.variant }}-macOS-${{ matrix.arch }}.dmg
          if-no-files-found: warn
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-macos-${{ matrix.variant }}-${{ matrix.arch }}
          path: |
            ${{ github.workspace }}/build/*.log
            ${{ github.workspace }}/build/*.xml
            ${{ runner.temp }}/gui-start-${{ matrix.variant }}-${{ matrix.arch }}.log
          if-no-files-found: warn
          retention-days: 30

      - name: Delete temporary signing keychain
        if: ${{ always() && env.MACOS_CERTIFICATE_BASE64 != '' }}
        run: |
          security delete-keychain \
            "$RUNNER_TEMP/printbridge-signing.keychain-db" || true
